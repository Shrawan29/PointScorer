name: Render Keepalive

on:
  schedule:
    # Every 10 minutes
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate keepalive URL secret
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
        run: |
          if [ -z "$KEEPALIVE_URL" ]; then
            echo "KEEPALIVE_URL secret is missing."
            echo "Add it in: Settings > Secrets and variables > Actions"
            exit 1
          fi

      - name: Ping Render public health endpoint
        env:
          KEEPALIVE_URL: ${{ secrets.KEEPALIVE_URL }}
        run: |
          echo "Pinging $KEEPALIVE_URL"
          HTTP_CODE=$(curl -sS -L --max-time 30 -o /tmp/keepalive-response.txt -w "%{http_code}" "$KEEPALIVE_URL")
          echo "HTTP status: $HTTP_CODE"
          cat /tmp/keepalive-response.txt

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 400 ]; then
            echo "Keepalive ping failed with status $HTTP_CODE"
            exit 1
          fi
